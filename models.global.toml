default_profile = "openrouter_elephant_free"

[profiles.openrouter_elephant_free]
model_backend = "langchain"
model_provider = "openrouter"
model = "@preset/agent-prompt"
model_timeout_seconds = 60
auth_ref = "openrouter"

[profiles.local_qwen]
